<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen轨道交通 - 关于我们</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #fff;
            --text-color: #333;
            --text-light: #666;
            --primary: #0066cc;
            --primary-dark: #004d99;
            --secondary: #3399ff;
            --shadow: rgba(0,0,0,0.05);
        }
        .dark-mode {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #eaeaea;
            --text-light: #aaa;
            --primary: #00a8e8;
            --primary-dark: #0077b6;
            --secondary: #00b4d8;
            --shadow: rgba(0,0,0,0.3);
        }
        body { 
            font-family: "Microsoft YaHei", sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.7;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px var(--shadow);
            transition: background 0.3s ease;
        }

        /* 头部样式 */
        .header { text-align: center; margin-bottom: 30px; position: relative; }
        .logo { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            margin-bottom: 10px;
            object-fit: cover;
            animation: fadeIn 2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .title { font-size: 32px; font-weight: 700; color: var(--text-color); margin-bottom: 8px; }
        .subtitle { color: var(--text-light); font-size: 16px; }
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 导航按钮（互动部分） */
        .nav-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 4px 10px var(--shadow);
        }
        .nav-btn.active { background: var(--primary-dark); }

        /* 内容区块 */
        section { display: none; margin-bottom: 40px; }
        section.active { display: block; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h2 { 
            font-size: 22px; 
            margin: 30px 0 15px; 
            color: var(--text-color); 
            border-left: 4px solid var(--primary); 
            padding-left: 12px;
        }
        p { margin-bottom: 16px; font-size: 16px; color: var(--text-light); }

        /* 轮播图 */
        .carousel {
            position: relative;
            height: 250px;
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
        }
        .carousel-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .carousel-slide.active { opacity: 1; }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .carousel-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px;
            text-align: center;
        }
        .carousel-prev, .carousel-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .carousel-prev { left: 10px; }
        .carousel-next { right: 10px; }
